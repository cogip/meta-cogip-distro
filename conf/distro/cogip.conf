# Cogip distro: minimal Wayland kiosk on Raspberry Pi 4.

DISTRO          = "cogip"
DISTRO_NAME     = "Cogip Kiosk"
DISTRO_VERSION  = "1.0"
DISTRO_CODENAME = "scarthgap"

MAINTAINER      = "Cogip Robotics <g.doffe@gmail.com>"

TARGET_VENDOR   = "-cogip"

# Wayland-only graphics stack. X11 / Mir explicitly excluded to keep the
# image small and the boot path short. "virtualization" pulls in the
# container runtime feature set required by meta-virtualization (docker).
DISTRO_FEATURES:append = " wayland opengl pam systemd usrmerge virtualization"
DISTRO_FEATURES:remove = "x11 sysvinit"

# systemd as init (PID 1) and as service manager. Faster cold-boot than
# sysvinit once tuned and lets us order Cog after the compositor cleanly.
INIT_MANAGER          = "systemd"
VIRTUAL-RUNTIME_init_manager     = "systemd"
VIRTUAL-RUNTIME_initscripts      = "systemd-compat-units"
VIRTUAL-RUNTIME_login_manager    = "shadow-base"
VIRTUAL-RUNTIME_dev_manager      = "systemd"

# Image format: compressed .wic.bz2 to flash on SD with dd.
# The 3-partition WKS_FILE (boot/root/data) is set by the kiosk image
# recipe in meta-cogip-app, which owns the image + its partitioning.
IMAGE_FSTYPES = "wic.bz2 wic.bmap"

# Pi 4 specific tunings: use the 64-bit kernel and the vc4-kms-v3d
# DRM/KMS driver (no closed dispmanx). This is what the v3d Mesa
# pipeline needs for WPE WebKit hardware acceleration.
RPI_USE_U_BOOT       = "0"
ENABLE_UART          = "1"
DISABLE_RPI_BOOT_LOGO = "0"
RASPBERRYPI_CAMERA_MODULE = "0"

# Trim the busybox-shell perimeter; we still keep one tty for debugging
# but the kiosk auto-logs into the Cog session.
PACKAGECONFIG:remove:pn-systemd = "audit"

# Use systemd's own network + DNS stack: networkd for L3 and resolved
# for the stub resolver. NetworkManager stays out of the image.
PACKAGECONFIG:append:pn-systemd = " networkd resolved"

# WPE backend: fdo (Mesa GBM + EGL via DRM/Wayland) is the upstream
# default Cog expects. rdk targets RDK/Comcast set-top boxes, not us.
PREFERRED_PROVIDER_virtual/wpebackend  = "wpebackend-fdo"
PREFERRED_RPROVIDER_virtual-wpebackend = "wpebackend-fdo"

# Reduce locale footprint to en_US.UTF-8 only.
IMAGE_LINGUAS  = "en-us"
GLIBC_GENERATE_LOCALES = "en_US.UTF-8"

# Default kiosk URL injected at build time, overridable via the build
# environment (`make build KIOSK_URL=...`).
KIOSK_URL ??= "http://localhost:8080"
